schema: node-definition/v1
id: chatgpt-remote-image-service-nrmj
title: Chatgpt Remote Image Service
description: 把这个 Skill 转换成一个不绑定上下游的 Runtime Node；首节点测试时允许用户直接输入 prompt，也要保留引用图、上传名、超时等
  skill 暴露的可配置参数。
version: 0.1-runtime-draft
skill:
  id: chatgpt-remote-image-service
  source: skill-installer
  install_command: bash <(curl -fsSL 'https://skill.vyibc.com/install-chatgpt-remote-image-service.sh?v=202606251544')
  source_digest:
    installer_url: https://skill.vyibc.com/install-chatgpt-remote-image-service.sh?v=202606251544
    zip_url: https://skill.vyibc.com/chatgpt-remote-image-service-20260629010255.zip
    files:
    - path: chatgpt-remote-image-service/agents/openai.yaml
      bytes: 227
      truncated: false
    - path: chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh
      bytes: 5390
      truncated: false
    - path: chatgpt-remote-image-service/SKILL.md
      bytes: 3484
      truncated: false
executor:
  type: agent-skill
  agent: hermes
  skill: chatgpt-remote-image-service
  request_template: node-execution-request/v1
entry:
  inputs:
    api_url:
      required: false
      input_kind: url
      value_type: url
      label: Api Url
      description: Value for CLI option --apiUrl.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --apiUrl -> $API_URL'
      cli_option: --apiUrl
    reference_image_file:
      required: false
      input_kind: file
      value_type: image
      label: Reference Image File
      description: Optional local reference image file path consumed by the skill.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --image -> $IMAGE'
      cli_option: --image
    reference_image_url:
      required: false
      input_kind: url
      value_type: url
      label: Reference Image Url
      description: Optional reference image URL consumed by the skill.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --image-url -> $IMAGE_URL; chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh:
        option --imageUrl -> $IMAGE_URL'
      cli_option: --image-url
    poll_interval:
      required: false
      input_kind: number
      value_type: number
      label: Poll Interval
      description: Value for CLI option --pollInterval.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --pollInterval -> $POLL_INTERVAL'
      cli_option: --pollInterval
    prompt:
      required: true
      input_kind: text
      value_type: text
      label: Prompt
      description: Task prompt or user instruction passed to the skill.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --prompt -> $PROMPT'
      cli_option: --prompt
      example: 生成一张小猫睡觉的照片
    timeout_seconds:
      required: false
      input_kind: number
      value_type: number
      label: Timeout Seconds
      description: Value for CLI option --timeoutSeconds.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --timeoutSeconds -> $TIMEOUT_SECONDS'
      cli_option: --timeoutSeconds
    upload_name:
      required: false
      input_kind: text
      value_type: text
      label: Upload Name
      description: Optional output object/file name hint.
      evidence: 'chatgpt-remote-image-service/scripts/chatgpt-remote-image.sh: option
        --uploadName -> $UPLOAD_NAME'
      cli_option: --uploadName
handoff:
