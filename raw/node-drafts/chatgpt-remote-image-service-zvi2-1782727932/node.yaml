      truncated: false
      content: "---\nname: chatgpt-remote-image-service\ndescription: Use when the\
        \ user wants to submit reference-image generation jobs to the remote ChatGPT\
        \ image HTTP service, poll task status, or get a public R2 image URL from\
        \ the hosted endpoint. Trigger for requests involving remote ChatGPT 生图接口,\
        \ 公网生图服务, chatgpt-image.vyibc.com, remote image generation API, taskId polling,\
        \ or CLI calls to the image service.\n---\n\n# ChatGPT Remote Image Service\n\
        \nUse this skill for the hosted ChatGPT image queue service.\n\nDefault endpoint:\n\
        \n```text\nhttps://chatgpt-image.vyibc.com\n```\n\nThe service is public and\
        \ does not require an Authorization header. Object names are made unique by\
        \ the service: if the caller sends `uploadName=test.png`, the final R2 object\
        \ will use the task id, such as `<taskId>.png`, to avoid overwriting prior\
        \ images.\n\nThe service supports both modes:\n\n- Reference-image generation:\
        \ send `image` and `prompt`.\n- Reference-image generation from URL: pass\
        \ `--imageUrl` to the CLI, or download the URL first for raw HTTP.\n- Pure\
        \ prompt generation: send only `prompt`.\n\n## Quick Start\n\nPrefer the bundled\
        \ CLI:\n\n```bash\nscripts/chatgpt-remote-image.sh \\\n  --imageUrl \"https://resource.vyibc.com/reference.png\"\
        \ \\\n  --prompt \"以参考图中的人物为准，生成一张在游泳馆的照片\"\n```\n\nLocal reference file:\n\
        \n```bash\nscripts/chatgpt-remote-image.sh \\\n  --image /path/to/reference.png\
        \ \\\n  --prompt \"以参考图中的人物为准，生成一张在游泳馆的照片\"\n```\n\nPure prompt generation:\n\
        \n```bash\nscripts/chatgpt-remote-image.sh \\\n  --prompt \"生成一张未来城市夜景照片，真实摄影风格\"\
        \n```\n\nThe script submits `POST /generate`, polls `GET /tasks/<taskId>`,\
        \ and exits successfully only when `publicImageUrl` is returned.\nAt startup\
        \ it also prints the current browser worker summary, including total workers,\
        \ logged-in workers, workers requiring login, active workers, queued tasks,\
        \ and CDP ports.\nIf\n...[truncated for Node Builder]"
