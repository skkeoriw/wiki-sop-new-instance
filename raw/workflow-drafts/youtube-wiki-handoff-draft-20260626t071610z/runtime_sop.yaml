name: youtube-research-wiki
version: '2.0'
id: youtube-research-wiki
title: YouTube Wiki SOP
wiki_local_path: /root/wiki/wiki-sop-new-instance
repo: skkeoriw/wiki-sop-new-instance
notify:
  telegram:
    token_env: YOUTUBE_WIKI_TG_TOKEN
    chat_id: '6938920500'
terminal_paths:
- wiki/**
- log.md
- logs/pipeline-runs/**
nodes:
  youtube-fetch:
    title: YouTube 元数据获取
    skill: sop-youtube-fetch
    webhook_route: sop-youtube-fetch
    mode: blocking
    trigger:
      type: file
      path: raw/youtube-links/**
    inputs:
      source_url:
        from: context.source_url
        kind: scalar
        type: string
        value_type: url
    outputs:
      source_url:
        from: context.source_url
        kind: scalar
        type: string
        value_type: url
        relayable: true
      metadata_file:
        from: context.stage_b_fetch.meta_file
        kind: file
        type: file
        value_type: json
        relayable: true
    infra:
      tg_notify: true
      log_record: true
    params: {}
  notebooklm-research:
    title: NotebookLM 研究
    skill: sop-notebooklm-research
    webhook_route: sop-notebooklm-research
    mode: blocking
    needs:
    - youtube-fetch
    trigger:
      type: file
      path: raw/youtube-metadata/**
    inputs:
      source_url: youtube-fetch.outputs.source_url
      metadata_file: youtube-fetch.outputs.metadata_file
    outputs:
      reports: raw/notebooklm-analysis/*.md
      mindmaps: raw/notebooklm-mindmaps/*.json
    infra:
      tg_notify: true
      log_record: true
    params:
      notebooklm:
        outputs:
        - report
        - mindmap
        language: zh_Hans
        notebook_title: wiki-sop-new-instance
        report_prompt: 请深度研究这个视频，提炼技术架构、核心观点、关键论据，以及对行业的影响。生成结构化中文研究报告。
        mindmap_prompt: 基于视频内容生成清晰的中文思维导图，突出核心概念之间的关系与层级。
  youtube-deep-research:
    title: YouTube 深度研究
    skill: sop-youtube-deep-research
    webhook_route: sop-youtube-deep-research
    mode: sidecar
    needs:
    - youtube-fetch
    trigger:
      type: file
      path: raw/youtube-metadata/**
    inputs:
      source_url:
        from: youtube-fetch.outputs.source_url
        kind: scalar
        type: string
        value_type: url
        resolvers:
        - id: direct-url
          kind: direct
        - id: metadata-source-url
          kind: json_path
          path: $.source_url
        - id: metadata-youtube-url
          kind: json_path
          path: $.youtube_url
        - id: text-url
          kind: regex
          pattern: https?://(?:www\.)?(?:youtube\.com/watch\?v=[A-Za-z0-9_-]+[^\s"'<>)]*|youtu\.be/[A-Za-z0-9_-]+[^\s"'<>)]*)
    outputs:
      analysis_file:
        path: raw/youtube-deep-research/{pipeline_id}/outputs/analysis.md
        kind: file
        type: file
        value_type: markdown
        relayable: true
        role: wiki-source
      transcript_file:
        path: raw/youtube-deep-research/{pipeline_id}/outputs/transcript.txt
        kind: file
        type: file
        value_type: text
        relayable: true
        role: transcript
    capabilities:
      git:
        enabled: true
        required: false
        managed_by: runtime-harness
        editable: true
        save_scope: node-definition
        description: Persist this node's workspace outputs to the current Instance
          repo.
        paths:
        - raw/youtube-deep-research/{pipeline_id}/outputs/**
        - raw/youtube-deep-research/{pipeline_id}/raw/**
      telegram:
        enabled: true
        required: false
        managed_by: runtime-harness
        editable: true
        save_scope: node-definition
        description: Send progress notifications through the current Instance Telegram
          config.
        trigger: stage-lifecycle
        triggers:
        - start
        - done
        - failed
    actions:
    - stage_runner on_start 记录节点开始状态，并按 capability 配置发送开始通知。
    - 执行节点 Skill 业务逻辑，生成声明 outputs 和业务 artifacts。
    - stage_runner on_done/on_failed 记录结果、校验产物，并按 capability 配置处理 GitHub / Telegram。
    infra:
      tg_notify: true
      git_record: true
      log_record: true
    params:
      workflow:
        output_dir: raw/youtube-deep-research
  wiki-build:
    title: Wiki 知识图谱构建
    skill: sop-wiki-build
    webhook_route: sop-wiki-build
    mode: blocking
    needs:
    - notebooklm-research
    trigger:
      type: file
      path: raw/notebooklm-analysis/**
    inputs:
      reports:
        from: notebooklm-research.outputs.reports
        kind: files
        type: files
        value_type: markdown
    optional_inputs:
      deep_research:
        from: youtube-deep-research.outputs.analysis_file
        required: false
        kind: files
        type: files
        value_type: markdown
    outputs:
      index:
        path: index.md
        kind: file
        type: file
        value_type: markdown
        relayable: true
      pages:
        path: wiki/**
        kind: files
        type: files
        value_type: markdown
        relayable: true
    infra:
      tg_notify: false
      log_record: true
    params:
      build_mode: incremental
      page_generation:
        target_pages: 35
        max_pages: 40
        max_entities: 10
        max_concepts: 29
        min_importance_score: 0.65
  tg-notify:
    title: Telegram 通知
    skill: sop-tg-notify
    webhook_route: sop-tg-notify
    mode: blocking
    needs:
    - wiki-build
    trigger:
      type: file
      path: index.md
    inputs:
      index:
        from: wiki-build.outputs.index
        required: true
        kind: file
        type: file
        value_type: markdown
    optional_inputs:
      message:
        from: edge.message
        required: false
        kind: scalar
        type: string
        value_type: text
        resolvers:
        - id: direct-text
          kind: direct
        - id: metadata-title
          kind: json_path
          path: $.title
        - id: metadata-description
          kind: json_path
          path: $.description
    outputs:
      telegram_message:
        path: logs/pipeline-runs/pipe-{run_id}.json
        kind: file
        type: file
        value_type: json
        relayable: false
    infra:
      tg_notify: true
      log_record: true
    params:
      build_mode: notify
  retry:
    title: 手动重试
    skill: sop-retry
    webhook_route: sop-retry
    mode: manual
    trigger:
      type: file
      path: raw/retry/**
    infra:
      tg_notify: true
      log_record: true
    params: {}
edges:
- id: edge-youtube-fetch-to-youtube-deep-research
  from: youtube-fetch
  to: youtube-deep-research
  relay:
    intent:
      title: 将视频地址交给深度研究节点
      brief: 下游只需要一个可解析的 YouTube URL。优先使用 source_url；只有显式选择 metadata_file 时才从 JSON
        字段提取 URL。
    bindings:
    - target_input: source_url
      required: true
      source:
        node: youtube-fetch
        output: source_url
        extractor:
          id: direct-url
          kind: direct
    resolver:
      strategy: explicit_first
      fallback: block
    validation:
      on_missing_required: block
      on_multiple_candidates: needs_review
      on_type_mismatch: block
- id: youtube-fetch-to-tg-notify-1782439277217
  from: youtube-fetch
  to: tg-notify
  relay:
    mode: auto_by_target_inputs
    mappings:
    - source_output: metadata_file
      target_input: message
      resolver: direct-text
    handoff_instruction: 将metadata_file 发送到tg的群里面
    node_execution_guide:
      format: markdown
      prompt: 'Use skill sop-tg-notify to execute this downstream node.


        Node Execution Guide

        - Edge: youtube-fetch -> tg-notify

        - Evaluation summary: Edge Handoff Instruction 已说明泛化输入的消费方式，可生成下游节点执行指导文档。

        - Edge Handoff Instruction: 将metadata_file 发送到tg的群里面


        Upstream artifacts

        - source_url: raw/node-runs/{pipeline_id}/outputs/files/source-url.txt

        - metadata_file: raw/node-runs/{pipeline_id}/outputs/files/metadata.json


        Execution rules

        - Use only the resolved Edge inputs and materialized artifacts listed here.

        - If a required artifact cannot be read, fail before executing the downstream
        skill.

        - Do not silently fall back to stale pipeline context or unrelated historical
        artifacts.

        - Preserve the downstream skill boundary; this guide shapes execution but
        does not replace the skill.'
    evaluation:
      status: trial_ready
      score: 0.76
      confidence: 0.76
      summary: 将上游的 metadata_file 作为消息发送到 Telegram 群组。下游输入接受 file:json, 因此可直接传递。
      decision: can_run_with_review
      evaluated_at: '2026-06-26T07:17:02Z'
      agent:
        provider: openai-compatible
        model: deepseek-v4-pro
        used_ai: true
    resolved_handoff:
      relay_mappings:
      - source_output: youtube-fetch.outputs.metadata_file
        target_input: tg-notify.inputs.message
        resolver: direct-text
    test_plan:
    - 物化 Edge 输入
    - 执行下游 skill
    - 校验声明输出
    - 记录 edge evaluation 和 guide
- id: edge-youtube-deep-research-to-wiki-build
  from: youtube-deep-research
  to: wiki-build
  relay:
    intent:
      title: 将深度研究产物交给 Wiki 构建节点
      brief: 将 analysis_file 作为 Wiki 构建的 deep_research 补充材料；transcript_file 可在自定义边中作为补充上下文。
    bindings:
    - target_input: deep_research
      required: false
      source:
        node: youtube-deep-research
        output: analysis_file
        extractor:
          id: direct-file
          kind: direct
    resolver:
      strategy: explicit_first
      fallback: needs_review
    validation:
      on_missing_required: needs_review
      on_multiple_candidates: needs_review
      on_type_mismatch: needs_review
pipeline:
- stage: youtube-fetch
  trigger: raw/youtube-links/**
  webhook_route: sop-youtube-fetch
  infra:
    tg_notify: true
    log_record: true
  params: {}
- stage: notebooklm-research
  trigger: raw/youtube-metadata/**
  webhook_route: sop-notebooklm-research
  infra:
    tg_notify: true
    log_record: true
  params:
    notebooklm:
      outputs:
      - report
      - mindmap
      language: zh_Hans
      notebook_title: wiki-sop-new-instance
      report_prompt: 请深度研究这个视频，提炼技术架构、核心观点、关键论据，以及对行业的影响。生成结构化中文研究报告。
      mindmap_prompt: 基于视频内容生成清晰的中文思维导图，突出核心概念之间的关系与层级。
- stage: youtube-deep-research
  trigger: raw/youtube-metadata/**
  webhook_route: sop-youtube-deep-research
  infra:
    tg_notify: true
    log_record: true
  params:
    workflow:
      output_dir: raw/youtube-deep-research
- stage: wiki-build
  trigger: raw/notebooklm-analysis/**
  webhook_route: sop-wiki-build
  infra:
    tg_notify: false
    log_record: true
  params:
    build_mode: incremental
- stage: tg-notify
  trigger: index.md
  webhook_route: sop-tg-notify
  infra:
    tg_notify: true
    log_record: true
  params:
    build_mode: notify
- stage: retry
  trigger: raw/retry/**
  webhook_route: sop-retry
  infra:
    tg_notify: true
    log_record: true
  params: {}
