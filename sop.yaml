name: youtube-research-wiki
version: '2.0'
id: youtube-research-wiki
title: YouTube Wiki SOP
wiki_local_path: .
repo: skkeoriw/wiki-sop-new-instance
notify:
  telegram:
    token_env: YOUTUBE_WIKI_TG_TOKEN
    chat_id: '6938920500'
terminal_paths:
- wiki/**
- log.md
- logs/pipeline-runs/**
nodes:
  youtube-fetch:
    title: YouTube 元数据获取
    skill: sop-youtube-fetch
    webhook_route: sop-youtube-fetch
    mode: blocking
    trigger:
      type: file
      path: raw/youtube-links/**
    inputs:
      source_url: context.source_url
    outputs:
      source_url: context.source_url
      metadata_file: raw/youtube-metadata/{pipeline_id}.json
    infra:
      tg_notify: true
      log_record: true
    params: {}
  notebooklm-research:
    title: NotebookLM 研究
    skill: sop-notebooklm-research
    webhook_route: sop-notebooklm-research
    mode: blocking
    needs:
    - youtube-fetch
    trigger:
      type: file
      path: raw/youtube-metadata/**
    inputs:
      source_url: youtube-fetch.outputs.source_url
      metadata_file: youtube-fetch.outputs.metadata_file
    outputs:
      reports: raw/notebooklm-analysis/*.md
      mindmaps: raw/notebooklm-mindmaps/*.json
    infra:
      tg_notify: true
      log_record: true
    params:
      notebooklm: &id001
        outputs:
        - report
        - mindmap
        language: zh_Hans
        notebook_title: wiki-sop-new-instance
        report_prompt: 请深度研究这个视频，提炼技术架构、核心观点、关键论据，以及对行业的影响。生成结构化中文研究报告。
        mindmap_prompt: 基于视频内容生成清晰的中文思维导图，突出核心概念之间的关系与层级。
  youtube-deep-research:
    title: YouTube 深度研究
    skill: sop-youtube-deep-research
    webhook_route: sop-youtube-deep-research
    mode: sidecar
    needs:
    - youtube-fetch
    trigger:
      type: file
      path: raw/youtube-metadata/**
    inputs:
      source_url: youtube-fetch.outputs.source_url
    outputs:
      analysis_file: raw/youtube-deep-research/{pipeline_id}/outputs/analysis.md
      transcript_file: raw/youtube-deep-research/{pipeline_id}/outputs/transcript.txt
    capabilities:
      git:
        enabled: true
        required: false
        managed_by: runtime-harness
        editable: true
        save_scope: node-definition
        description: Persist this node's workspace outputs to the current Instance
          repo.
        paths:
        - raw/youtube-deep-research/{pipeline_id}/outputs/**
        - raw/youtube-deep-research/{pipeline_id}/raw/**
      telegram:
        enabled: true
        required: false
        managed_by: runtime-harness
        editable: true
        save_scope: node-definition
        description: Send progress notifications through the current Instance Telegram
          config.
        trigger: stage-lifecycle
        triggers:
        - start
        - done
        - failed
    infra:
      tg_notify: true
      log_record: true
    params:
      workflow:
        output_dir: raw/youtube-deep-research
  wiki-build:
    title: Wiki 知识图谱构建
    skill: sop-wiki-build
    webhook_route: sop-wiki-build
    mode: blocking
    needs:
    - notebooklm-research
    trigger:
      type: file
      path: raw/notebooklm-analysis/**
    inputs:
      reports: notebooklm-research.outputs.reports
    optional_inputs:
      deep_research: youtube-deep-research.outputs.analysis_file
    outputs:
      index: index.md
      pages: wiki/**
    infra:
      tg_notify: false
      log_record: true
    params:
      build_mode: incremental
  tg-notify:
    title: Telegram 通知
    skill: sop-tg-notify
    webhook_route: sop-tg-notify
    mode: blocking
    needs:
    - wiki-build
    trigger:
      type: file
      path: index.md
    inputs:
      index: wiki-build.outputs.index
    outputs:
      telegram_message: logs/pipeline-runs/pipe-{run_id}.json
    infra:
      tg_notify: true
      log_record: true
    params:
      build_mode: notify
  retry:
    title: 手动重试
    skill: sop-retry
    webhook_route: sop-retry
    mode: manual
    trigger:
      type: file
      path: raw/retry/**
    infra:
      tg_notify: true
      log_record: true
    params: {}
edges:
- id: edge-youtube-fetch-to-youtube-deep-research
  from: youtube-fetch
  to: youtube-deep-research
  relay:
    intent:
      title: 将视频地址交给深度研究节点
      brief: 下游只需要一个可解析的 YouTube URL。优先使用 source_url；只有显式选择 metadata_file 时才从 JSON
        字段提取 URL。
    bindings:
    - target_input: source_url
      required: true
      source:
        node: youtube-fetch
        output: source_url
        extractor:
          id: direct-url
          kind: direct
    resolver:
      strategy: explicit_first
      fallback: block
    validation:
      on_missing_required: block
      on_multiple_candidates: needs_review
      on_type_mismatch: block
- id: edge-youtube-fetch-title-to-tg-notify
  from: youtube-fetch
  to: tg-notify
  relay:
    intent:
      title: 将视频标题作为通知内容
      brief: 这条边只用于测试或自定义工作流，将 metadata_file 中的视频标题提取成 Telegram 文本消息。
    bindings:
    - target_input: message
      required: true
      source:
        node: youtube-fetch
        output: metadata_file
        extractor:
          id: metadata-title
          kind: json_path
          path: $.title
    resolver:
      strategy: explicit_first
      fallback: needs_review
    validation:
      on_missing_required: block
      on_multiple_candidates: needs_review
      on_type_mismatch: block
- id: edge-youtube-deep-research-to-wiki-build
  from: youtube-deep-research
  to: wiki-build
  relay:
    intent:
      title: 将深度研究产物交给 Wiki 构建节点
      brief: 将 analysis_file 作为 Wiki 构建的 deep_research 补充材料；transcript_file 可在自定义边中作为补充上下文。
    bindings:
    - target_input: deep_research
      required: false
      source:
        node: youtube-deep-research
        output: analysis_file
        extractor:
          id: direct-file
          kind: direct
    resolver:
      strategy: explicit_first
      fallback: needs_review
    validation:
      on_missing_required: needs_review
      on_multiple_candidates: needs_review
      on_type_mismatch: needs_review
pipeline:
- stage: youtube-fetch
  trigger: raw/youtube-links/**
  webhook_route: sop-youtube-fetch
  infra:
    tg_notify: true
    log_record: true
  params: {}
- stage: notebooklm-research
  trigger: raw/youtube-metadata/**
  webhook_route: sop-notebooklm-research
  infra:
    tg_notify: true
    log_record: true
  params:
    notebooklm: *id001
- stage: youtube-deep-research
  trigger: raw/youtube-metadata/**
  webhook_route: sop-youtube-deep-research
  infra:
    tg_notify: true
    log_record: true
  params:
    workflow:
      output_dir: raw/youtube-deep-research
- stage: wiki-build
  trigger: raw/notebooklm-analysis/**
  webhook_route: sop-wiki-build
  infra:
    tg_notify: false
    log_record: true
  params:
    build_mode: incremental
- stage: tg-notify
  trigger: index.md
  webhook_route: sop-tg-notify
  infra:
    tg_notify: true
    log_record: true
  params:
    build_mode: notify
- stage: retry
  trigger: raw/retry/**
  webhook_route: sop-retry
  infra:
    tg_notify: true
    log_record: true
  params: {}
